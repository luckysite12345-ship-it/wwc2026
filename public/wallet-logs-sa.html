<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wallet Logs</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-body">

    <!-- SIDEBAR (COPY SAME SIDEBAR HERE) -->
    <div class="sidebar" id="sidebar">
        <h2>Welcome, <span class="username">Super Admin</span></h2>

        <a href="superadmin.html">🏠 Dashboard</a>
        <a href="wallet-logs-sa.html">📄 Wallet Logs</a>
        <a href="commission-logs-sa.html">💰 Commission Logs</a>
        <a href="archives.html">🗂 Game Archives</a>

        <div class="category">Downlines</div>
        <a href="agents-sa.html">👥 Agents</a>
        <a href="players-sa.html">🧑 Players</a>

        <div class="category">Settings</div>
        <!--<a href="account.html">👥 Account Management</a>-->
        <a href="change-password-superadmin.html">🔑 Change Password</a>
        <a href="#" onclick="logout()">🚪 Logout</a>
    </div>
    <!-- Overlay for mobile -->
    <div id="overlay" class="overlay" onclick="closeSidebar()"></div>
    <!-- MAIN -->
    <div class="main">

        <div class="header">
            <div class="hamburger" onclick="toggleSidebar()">☰</div>
        </div>

        <div class="content">
            <h2>Wallet Logs</h2>

            <div class="table-wrapper">
                <select id="userFilter" onchange="loadWalletLogs()">
                    <option value="">All Users</option>
                </select>
                <table class="styled-table" id="walletTable">
                    <thead>
                        <tr>
                            <th>Username</th>
                            <th>Date</th>
                            <th>Type</th>
                            <th>Amount</th>
                            <th>Balance After</th>
                            <th>Description</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <footer>
            © 2024 <span class="website-name">Website</span>. All rights reserved.
        </footer>

    </div>

    <script>
        // =========================
        // Global App Config
        // =========================
        let APP_CONFIG = {
            websiteName: "Website",
            websiteUrl: window.location.origin
        };

        // =========================
        // Load Config
        // =========================
        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                const data = await res.json();

                APP_CONFIG = data;

                // Update page title
                document.title = `Wallet Logs - ${data.websiteName}`;

                // Update website name placeholders
                document.querySelectorAll('.website-name')
                    .forEach(el => {
                        el.textContent = data.websiteName;
                    });

            } catch (err) {
                console.error('Failed to load config:', err);
            }
        }
        async function checkSession() {
            try {
                const res = await fetch('/api/dashboard', {
                    credentials: 'include'
                });

                if (res.status === 401) {
                    window.location.href = '/';
                    return;
                }

                const data = await res.json();
                if (data.role !== 'admin') {
                    const summaryLink = document.getElementById('summaryLink');
                    if (summaryLink) summaryLink.style.display = 'none';
                }
                document.querySelectorAll('.username')
                    .forEach(el => el.textContent = data.username);

            } catch (err) {
                console.error(err);
                window.location.href = '/';
            }
        }
        function formatMoney(num){
            return Number(num || 0).toLocaleString(undefined, {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }
       
        // =========================
        // Hamburger & overlay
        // =========================
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');

            if (window.innerWidth <= 768) {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active'); // show overlay
            } else {
                sidebar.classList.toggle('collapsed');
            }
        }

        function closeSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');

            sidebar.classList.remove('active');
            overlay.classList.remove('active');
        }

        // Close sidebar if click outside (mobile)
        document.addEventListener('click', function(event) {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            if (window.innerWidth <= 768 && sidebar.classList.contains('active')) {
                if (!sidebar.contains(event.target) && !event.target.classList.contains('hamburger')) {
                    closeSidebar();
                }
            }
        });
        async function loadWalletLogs() {
            try {
                const res = await fetch('/api/all-wallet-transactions', {
                    credentials: 'include'
                });

                if (res.status === 401) {
                    window.location.href = '/';
                    return;
                }

                const data = await res.json();

                const tbody = document.querySelector('#walletTable tbody');
                tbody.innerHTML = '';

                const selectedUser = document.getElementById('userFilter')?.value;

                let filtered = data;

                if (selectedUser) {
                    filtered = data.filter(tx => tx.username === selectedUser);
                }

                if (filtered.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6">No records found</td></tr>`;
                    return;
                }

                filtered.forEach(tx => {
                    const row = document.createElement('tr');

                    const typeIcon = tx.type === 'credit' ? '↑' : '↓';
                    const typeColor = tx.type === 'credit' ? 'red' : 'green';

                    row.innerHTML = `
                        <td>${tx.username || '-'}</td>
                        <td>${new Date(tx.created_at).toLocaleString()}</td>
                        <td style="color: ${typeColor}; font-weight: bold;">
                            ${typeIcon} ${tx.type}
                        </td>
                        <td>${formatMoney(tx.amount)}</td>
                        <td>${formatMoney(tx.balance_after)}</td>
                        <td>${tx.description}</td>
                    `;

                    tbody.appendChild(row);
                });

            } catch (err) {
                console.error(err);
            }
        }
        
        
        //Code for logout
        async function logout() {
            try {
                const res = await fetch('/api/logout', {
                    method: 'GET',
                    credentials: 'include'
                });

                const data = await res.json();
                console.log(data);

                // ✅ Redirect after logout
                showSnackbar("Logged out successfully");

                setTimeout(() => {
                    window.location.href = '/index.html';
                }, 1000);

            } catch (err) {
                console.error(err);
                showSnackbar("Logout failed", "error");
            }
        }
        async function loadUsers() {
            try {
                const res = await fetch('/api/all-wallet-transactions', {
                    credentials: 'include'
                });

                const data = await res.json();

                const select = document.getElementById('userFilter');
                select.innerHTML = `<option value="">All Users</option>`;

                const seen = new Set();

                data.forEach(tx => {
                    if (!tx.username) return;

                    const key = tx.username.toLowerCase();
                    if (seen.has(key)) return;

                    seen.add(key);

                    const opt = document.createElement('option');
                    opt.value = tx.username;
                    opt.textContent = tx.username;

                    select.appendChild(opt);
                });

            } catch (err) {
                console.error(err);
            }
        }
        // =========================
        // INIT
        // =========================
        async function init() {
            await loadConfig();
            await checkSession();
            await loadUsers();
            await loadWalletLogs();
        }

        init();
        
    </script>

</body>
</html>
