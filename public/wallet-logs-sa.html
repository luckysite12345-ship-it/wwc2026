<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wallet Logs</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-body">

    <!-- SIDEBAR (COPY SAME SIDEBAR HERE) -->
    <div class="sidebar" id="sidebar">
        <h2>Welcome, <span class="username">Super Admin</span></h2>

        <a href="superadmin.html">🏠 Dashboard</a>
        <a href="wallet-logs-sa.html">📄 Wallet Logs</a>
        <a href="commission-logs-sa.html">💰 Commission Logs</a>
        <a href="gamearchives.html">🗂 Fight Logs</a>

        <div class="category">Downlines</div>
        <a href="agents-sa.html">👥 Agents</a>
        <a href="players-sa.html">🧑 Players</a>

        <div class="category">Settings</div>
        <!--<a href="account.html">👥 Account Management</a>-->
        <a href="change-password-superadmin.html">🔑 Change Password</a>
        <a href="#" onclick="logout()">🚪 Logout</a>
    </div>
    <!-- Overlay for mobile -->
    <div id="overlay" class="overlay" onclick="closeSidebar()"></div>
    <!-- MAIN -->
    <div class="main">

        <div class="header">
            <div class="hamburger" onclick="toggleSidebar()">☰</div>
        </div>

        <div class="content">
            <h2>Wallet Logs</h2>

            <div class="table-wrapper">
                <div class="filters">

                    <input
                        type="text"
                        id="searchInput"
                        placeholder="Search username..."
                    >

                    <select id="roleFilter">
                        <option value="">All Roles</option>
                        <option value="player">Player</option>
                        <option value="agent">Agent</option>
                        <option value="sub_agent">Sub Agent</option>
                        <option value="master_agent">Master Agent</option>
                        <option value="admin">Admin</option>
                    </select>

                    <input type="date" id="fromDate">
                    <input type="date" id="toDate">

                    <select id="limitSelect">
                        <option value="25">25</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>

                    <button onclick="applyFilters()">
                        Filter
                    </button>

                </div>
                <table class="styled-table" id="walletTable">
                    <thead>
                        <tr>

                            <th onclick="sortTable('username')">
                                Username
                            </th>

                            <th onclick="sortTable('role')">
                                Role
                            </th>

                            <th onclick="sortTable('created_at')">
                                Date
                            </th>

                            <th onclick="sortTable('type')">
                                Type
                            </th>

                            <th onclick="sortTable('amount')">
                                Amount
                            </th>

                            <th onclick="sortTable('balance_after')">
                                Balance After
                            </th>

                            <th>
                                Description
                            </th>

                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
                <div class="pagination">

                    <button onclick="firstPage()">First</button>

                    <button onclick="prevPage()">Prev</button>

                    <span id="pageInfo">
                        Page 1
                    </span>

                    <button onclick="nextPage()">Next</button>

                    <button onclick="lastPage()">Last</button>

                </div>
            </div>
        </div>

        <footer>
            © 2024 <span class="website-name">Website</span>. All rights reserved.
        </footer>

    </div>

    <script>
        // =========================
        // Global App Config
        // =========================
        let APP_CONFIG = {
            websiteName: "Website",
            websiteUrl: window.location.origin
        };

        // =========================
        // Load Config
        // =========================
        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                const data = await res.json();

                APP_CONFIG = data;

                // Update page title
                document.title = `Wallet Logs - ${data.websiteName}`;

                // Update website name placeholders
                document.querySelectorAll('.website-name')
                    .forEach(el => {
                        el.textContent = data.websiteName;
                    });

            } catch (err) {
                console.error('Failed to load config:', err);
            }
        }
        async function checkSession() {
            try {
                const res = await fetch('/api/dashboard', {
                    credentials: 'include'
                });

                if (res.status === 401) {
                    window.location.href = '/';
                    return;
                }

                const data = await res.json();
                if (data.role !== '-1') {
                    const summaryLink = document.getElementById('summaryLink');
                    if (summaryLink) summaryLink.style.display = 'none';
                }
                document.querySelectorAll('.username')
                    .forEach(el => el.textContent = data.username);

            } catch (err) {
                console.error(err);
                window.location.href = '/';
            }
        }
        function formatMoney(num){
            return Number(num || 0).toLocaleString(undefined, {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }
       
        // =========================
        // Hamburger & overlay
        // =========================
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');

            if (window.innerWidth <= 768) {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active'); // show overlay
            } else {
                sidebar.classList.toggle('collapsed');
            }
        }

        function closeSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');

            sidebar.classList.remove('active');
            overlay.classList.remove('active');
        }

        // Close sidebar if click outside (mobile)
        document.addEventListener('click', function(event) {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            if (window.innerWidth <= 768 && sidebar.classList.contains('active')) {
                if (!sidebar.contains(event.target) && !event.target.classList.contains('hamburger')) {
                    closeSidebar();
                }
            }
        });
        let currentPage = 1;
        let totalPages = 1;

        let currentSort = 'created_at';
        let currentOrder = 'DESC';

        async function loadWalletLogs() {

            try {

                const search =
                    document.getElementById('searchInput').value;

                const role =
                    document.getElementById('roleFilter').value;

                const from =
                    document.getElementById('fromDate').value;

                const to =
                    document.getElementById('toDate').value;

                const limit =
                    document.getElementById('limitSelect').value;

                const res = await fetch(

                    `/api/superadmin/all-wallet-transactions?` +

                    `search=${encodeURIComponent(search)}` +
                    `&role=${encodeURIComponent(role)}` +
                    `&from=${from}` +
                    `&to=${to}` +
                    `&page=${currentPage}` +
                    `&limit=${limit}` +
                    `&sort=${currentSort}` +
                    `&order=${currentOrder}`,

                    {
                        credentials: 'include'
                    }
                );

                if (res.status === 401) {
                    window.location.href = '/';
                    return;
                }

                const data = await res.json();
                console.log(data);
                totalPages = data.totalPages;

                document.getElementById('pageInfo')
                    .textContent =
                    `Page ${data.currentPage} of ${data.totalPages}`;

                const tbody =
                    document.querySelector(
                        '#walletTable tbody'
                    );

                tbody.innerHTML = '';

                if (data.rows.length === 0) {

                    tbody.innerHTML = `
                        <tr>
                            <td colspan="7">
                                No records found
                            </td>
                        </tr>
                    `;

                    return;
                }

                data.rows.forEach(tx => {

                    const row =
                        document.createElement('tr');

                    const typeColor =
                        tx.type === 'credit'
                            ? 'red'
                            : 'blue';

                    row.innerHTML = `

                        <td>${tx.username || '-'}</td>

                        <td>${tx.role || '-'}</td>

                        <td>
                            ${new Date(
                                tx.created_at
                            ).toLocaleString()}
                        </td>

                        <td style="
                            color:${typeColor};
                            font-weight:bold;
                        ">
                            ${tx.type}
                        </td>

                        <td>
                            ${formatMoney(tx.amount)}
                        </td>

                        <td>
                            ${formatMoney(tx.balance_after)}
                        </td>

                        <td>
                            ${tx.description || '-'}
                        </td>
                    `;

                    tbody.appendChild(row);

                });

            } catch (err) {

                console.error(err);

            }

        }
        
        
        //Code for logout
        async function logout() {
            try {
                const res = await fetch('/api/logout', {
                    method: 'GET',
                    credentials: 'include'
                });

                const data = await res.json();
                console.log(data);

                // ✅ Redirect after logout
                showSnackbar("Logged out successfully");

                setTimeout(() => {
                    window.location.href = '/index.html';
                }, 1000);

            } catch (err) {
                console.error(err);
                showSnackbar("Logout failed", "error");
            }
        }
        
        function applyFilters() {

            currentPage = 1;

            loadWalletLogs();

        }

        function sortTable(column) {

            if (currentSort === column) {

                currentOrder =
                    currentOrder === 'ASC'
                        ? 'DESC'
                        : 'ASC';

            } else {

                currentSort = column;

                currentOrder = 'ASC';

            }

            loadWalletLogs();

        }

        function firstPage() {

            currentPage = 1;

            loadWalletLogs();

        }

        function prevPage() {

            if (currentPage > 1) {

                currentPage--;

                loadWalletLogs();

            }

        }

        function nextPage() {

            if (currentPage < totalPages) {

                currentPage++;

                loadWalletLogs();

            }

        }

        function lastPage() {

            currentPage = totalPages;

            loadWalletLogs();

        }
        // =========================
        // INIT
        // =========================
        async function init() {
            await loadConfig();
            await checkSession();
            await loadWalletLogs();
        }

        init();
        
    </script>

</body>
</html>
