<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sign In</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div id="snackbar"></div>
    <div class="login-container">
        <!-- Logo -->
        <img src="logo.png" alt="SWC888 Logo" class="logo">

        <!-- Site Title -->
        <h1 class="website-name"></h1>

        <!-- Username Field -->
        <div class="input-group">
            <label for="username">Username</label>
            <div class="input-icon">
                <span class="icon">👤</span>
                <input type="text" id="username" placeholder="Enter username">
            </div>
        </div>

        <!-- Password Field -->
        <div class="input-group">
            <label for="password">Password</label>
            <div class="input-icon">
                <span class="icon">🔒</span>
                <input type="password" id="password" placeholder="Enter password">
            </div>
        </div>

        <!-- Sign In Button -->
        <button onclick="login()">Sign In</button>
    </div>

    <script>
        // =========================
        // Global App Config
        // =========================
        let APP_CONFIG = {
            websiteName: "Website",
            websiteUrl: window.location.origin
        };

        // =========================
        // Load Config
        // =========================
        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                const data = await res.json();

                APP_CONFIG = data;

                // Update page title
                document.title = `Sign In - ${data.websiteName}`;

                // Update visible branding (logo text fallback)
                const titleEl = document.querySelector("h1");
                if (titleEl) {
                    titleEl.textContent = data.websiteName;
                }

            } catch (err) {
                console.error('Failed to load config:', err);
            }
        }
        function showSnackbar(message, type = "success") {
            const bar = document.getElementById("snackbar");

            bar.textContent = message;
            bar.className = "show " + type;

            setTimeout(() => {
                bar.className = bar.className.replace("show", "").trim();
            }, 3000);
        }
        // Login function
        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                showSnackbar("Please enter both username and password", "warning");
                return;
            }

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (data.error) {
                    showSnackbar(data.error, "error");
                    return;
                }

                // Redirect based on role
                switch(data.role) {
                    case "admin":
                        showSnackbar("Login successful!", "success");
                        window.location.href = "admin.html";
                        break;
                    case "player":
                        showSnackbar("Login successful!", "success");
                        window.location.href = "player.html";
                        break;
                    case "master_agent":
                        showSnackbar("Login successful!", "success");
                        window.location.href = "admin.html";
                        break;
                    case "sub_agent":
                        showSnackbar("Login successful!", "success");
                        window.location.href = "admin.html";
                        break;
                    case "agent":
                        showSnackbar("Login successful!", "success");
                        window.location.href = "admin.html";
                        break;
                    case "declarator":
                        showSnackbar("Login successful!", "success");
                        window.location.href = "declarator.html";
                        break;
                    case "-1":
                        showSnackbar("Login successful!", "success");
                        window.location.href = "superadmin.html";
                        break;
                    default:
                        showSnackbar("Unknown role");
                }

            } catch (err) {
                showSnackbar("Server error", "error");
                console.error(err);
            }
        }
        // =========================
        // Enter Key Login UX
        // =========================
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                login();
            }
        });
        // =========================
        // Init
        // =========================
        async function init() {
            await loadConfig();
        }

        init();
    </script>
</body>
</html>
