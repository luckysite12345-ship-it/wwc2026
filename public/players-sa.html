<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Players Management</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-body">

    <!-- SIDEBAR (COPY SAME SIDEBAR HERE) -->
    <div class="sidebar" id="sidebar">
        <h2>Welcome, <span class="username">Super Admin</span></h2>

        <a href="superadmin.html">🏠 Dashboard</a>
        <a href="wallet-logs-sa.html">📄 Wallet Logs</a>
        <a href="commission-logs-sa.html">💰 Commission Logs</a>
        <a href="gamearchives.html">🗂 Game Archives</a>

        <div class="category">Downlines</div>
        <a href="agents-sa.html">👥 Agents</a>
        <a href="players-sa.html">🧑 Players</a>

        <div class="category">Settings</div>
        <!--<a href="account.html">👥 Account Management</a>-->
        <a href="change-password-superadmin.html">🔑 Change Password</a>
        <a href="#" onclick="logout()">🚪 Logout</a>
    </div>
    <div id="overlay" class="overlay"></div>
    <!-- MAIN -->
    <div class="main">

        <div class="header">
            <div class="hamburger" onclick="toggleSidebar()">☰</div>
        </div>

        <div class="content">
            <h2>Players</h2>

            <div class="membership-card">

                <!-- FILTER -->
                <div class="filter-bar">
                    <!-- SEARCH BOX -->
                    <input
                        type="text"
                        id="searchPlayer"
                        class="membership-link"
                        placeholder="🔍 Search username..."
                        onkeyup="loadPlayers()"
                    >
                    <!--<select id="statusFilter" class="styled-select" onchange="loadPlayers()">-->
                    <select id="statusFilter" class="membership-link" onchange="loadPlayers()">
                        <option value="">All Status</option>
                        <option value="online">🟢 Active</option>
                        <option value="offline">⚪ Offline</option>
                        <option value="suspended">🔴 Suspended</option>
                    </select>
                </div>

                <!-- TABLE -->
                <div class="table-wrapper">
                    <table class="styled-table">
                        <thead>
                            <tr>
                                <th>Username</th>
                                <th>Actions</th>
                                <th>Wallet</th>
                                <th>Status</th>
                                <th>Registration</th>
                            </tr>
                        </thead>
                        <tbody id="playersTable"></tbody>
                    </table>
                </div>
            </div>
            <div id="snackbar"></div>
        </div>
        <!-- MODAL -->
        <div id="pointsModal" class="modal">
            <div class="modal-content">
                <h3>Add Points</h3>
                <input type="number" id="pointsInput" style="width: 100%;padding: 12px;" placeholder="Enter points">
                <button onclick="confirmAddPoints()">✅ Confirm</button>
                <button onclick="closeModal()">❌ Cancel</button>
            </div>
        </div>
        <div id="confirmModal" class="modal">
            <div class="modal-content">
                <h3 id="confirmTitle">Confirm Action</h3>
                <p id="confirmMessage"></p>
                <button onclick="confirmAction()">✅ Confirm</button>
                <button onclick="closeConfirmModal()">❌ Cancel</button>
            </div>
        </div>
        <div id="withdrawModal" class="modal">
            <div class="modal-content">
                <h3>Withdraw Points</h3>
                <input type="number" id="withdrawInput" placeholder="Enter amount" style="width:100%; padding:12px;">
                <button onclick="confirmWithdraw()">💸 Confirm</button>
                <button onclick="closeWithdrawModal()">❌ Cancel</button>
            </div>
        </div>
        <footer>
            © 2024 <span class="website-name"></span>. All rights reserved.
        </footer>

    </div>

    <script>
        // =========================
        // Global App Config
        // =========================
        let APP_CONFIG = {
            websiteName: "Website",
            websiteUrl: window.location.origin
        };

        // =========================
        // Load Config
        // =========================
        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                const data = await res.json();

                APP_CONFIG = data;

                // Update page title
                document.title = `Players Management - ${data.websiteName}`;

                // Update website placeholders
                document.querySelectorAll('.website-name')
                    .forEach(el => {
                        el.textContent = data.websiteName;
                    });

            } catch (err) {
                console.error('Failed to load config:', err);
            }
        }
        function formatNumber(amount) {
            return new Intl.NumberFormat('en-PH', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(amount);
        }
        async function checkSession() {
            try {
                const res = await fetch('/api/dashboard', {
                    credentials: 'include'
                });

                if (res.status === 401) {
                    window.location.href = '/';
                    return;
                }

                const data = await res.json();

                if (data.role !== '-1') {
                    window.location.href = '/';
                    return;
                }

                document.querySelectorAll('.username')
                    .forEach(el => el.textContent = data.username);

                document.querySelectorAll('.website-name')
            } catch (err) {
                console.error(err);
                window.location.href = '/';
            }
        }
            
        

        
        // =========================
        // Hamburger & overlay
        // =========================
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');

            if (window.innerWidth <= 768) {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active'); // show overlay
            } else {
                sidebar.classList.toggle('collapsed');
            }
        }

        
        function closeSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');

            sidebar.classList.remove('active');
            overlay.classList.remove('active');
        }

        // Close sidebar if click outside (mobile)
        document.addEventListener('click', function(event) {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            if (window.innerWidth <= 768 && sidebar.classList.contains('active')) {
                if (!sidebar.contains(event.target) && !event.target.classList.contains('hamburger')) {
                    closeSidebar();
                }
            }
        });
        
        function showSnackbar(message, success = false) {
            const snackbar = document.getElementById("snackbar");
            snackbar.textContent = message;
            snackbar.className = success ? "show success" : "show";

            setTimeout(() => {
                snackbar.className = snackbar.className.replace("show", "");
            }, 3000);
        }

        // =========================
        // Loading players
        // =========================
        let selectedUserId = null;
        let currentUserId = null;

        async function loadPlayers() {
            try {
                const session = await fetch('/api/dashboard', { credentials: 'include' });
                const user = await session.json();
                currentUserId = user.id;

                const res = await fetch('/api/players', { credentials: 'include' });
                let players = await res.json();
                const search = document.getElementById('searchPlayer').value.toLowerCase();
                const filter = document.getElementById('statusFilter').value;
                if (filter) {
                    players = players.filter(p => p.status === filter);
                }
                // username search filter
                if (search) {
                    players = players.filter(p =>
                        p.username.toLowerCase().includes(search)
                    );
                }
                const table = document.getElementById('playersTable');
                table.innerHTML = '';

                players.forEach(p => {

                    const row = document.createElement('tr');

                    row.innerHTML = `
                        <td>${p.username}</td>
                        <td class="actions">
                            <select class="action-dropdown styled-select" 
                                onchange="handlePlayerAction(this, this.value, ${p.id}, '${p.status}')">

                                <option value="">⚙️ Select Action</option>
                                <option value="promote">⬆️ Set at Agent</option>
                                <option value="add">➕ Load</option>
                                <option value="withdraw">💸 Withdraw</option>
                                <option value="${p.status === 'suspended' ? 'activate' : 'suspend'}">
                                    ${p.status === 'suspended' ? '✅ Activate' : '⛔ Suspend'}
                                </option>
                                <option value="reset">🔑 Reset Password</option>

                            </select>
                        </td>
                        <td>${formatNumber(p.points)}</td>
                        <td class="status ${p.status}">${p.status}</td>
                        <td>${new Date(p.created_at).toLocaleDateString('en-US', {
                            year: 'numeric',
                            month: 'long',
                            day: 'numeric'
                        })}</td>
                    `;

                    table.appendChild(row);
                });

            } catch (err) {
                console.error(err);
            }
        }
        
        // =========================
        // Toggle status
        // =========================
        async function toggleStatus(userId, currentStatus) {
            const newStatus = currentStatus === 'suspended' ? 'offline' : 'suspended';

            await fetch('/api/update-status', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ userId, status: newStatus })
            });

            showSnackbar("Status updated");
            loadPlayers();
        }
        // =========================
        // Reset password
        // =========================
        async function resetPassword(userId) {
            openConfirmModal("Reset password to 123456?", async () => {
                const res = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ userId })
                });

                const data = await res.json();
                showSnackbar(data.message);
            });
        }
        // =========================
        // Loading points modal
        // =========================
        function openModal(userId) {
            selectedUserId = userId;
            document.getElementById('pointsModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('pointsModal').style.display = 'none';
        }

        async function confirmAddPoints() {
            const amount = document.getElementById('pointsInput').value;

            if (!amount || amount <= 0) {
                showSnackbar("Invalid amount");
                return;
            }

            const res = await fetch('/api/add-points', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({
                    userId: selectedUserId,
                    amount: Number(amount)
                })
            });

            const data = await res.json();

            // ✅ HANDLE ERROR FROM SERVER
            if (!res.ok) {
                showSnackbar(data.error);
                return;
            }

            // ✅ SUCCESS
            showSnackbar(data.message, true);

            closeModal();
            loadPlayers();
        }
        
        // =========================
        // Promote user to agent
        // =========================
        async function promoteUser(userId) {
            try {
                const res = await fetch('/api/promote-user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ userId })
                });

                const data = await res.json();

                if (!res.ok) {
                    showSnackbar(data.error);
                    return;
                }

                showSnackbar(data.message, true);
                loadPlayers();

            } catch (err) {
                console.error(err);
                showSnackbar("Server error");
            }
        }
        function handlePlayerAction(selectEl, action, userId, status) {
            if (!action) return;

            switch(action) {
                case 'promote':
                    promoteUser(userId);
                    break;

                case 'add':
                    openModal(userId);
                    break;
                case 'withdraw':
                    openWithdrawModal(userId);
                    break;
                case 'activate':
                case 'suspend':
                    openConfirmModal(
                        action === 'activate' ? "Activate this user?" : "Suspend this user?",
                        () => toggleStatus(userId, status)
                    );
                    break;

                case 'reset':
                    resetPassword(userId);
                    break;
            }

            // ✅ Reset dropdown (same behavior as agents but safer)
            selectEl.value = "";
        }
        let confirmCallback = null;

        function openConfirmModal(message, callback) {
            document.getElementById('confirmMessage').textContent = message;
            confirmCallback = callback;
            document.getElementById('confirmModal').style.display = 'flex';
        }

        function closeConfirmModal() {
            document.getElementById('confirmModal').style.display = 'none';
            confirmCallback = null;
        }

        async function confirmAction() {
            if (confirmCallback) {
                await confirmCallback(); // ✅ wait for API
            }
            closeConfirmModal();
        }
        let withdrawUserId = null;

        function openWithdrawModal(userId) {
            withdrawUserId = userId;
            document.getElementById('withdrawModal').style.display = 'flex';
        }

        function closeWithdrawModal() {
            document.getElementById('withdrawModal').style.display = 'none';
            document.getElementById('withdrawInput').value = ''; // ✅ reset
        }

        async function confirmWithdraw() {
            const amount = document.getElementById('withdrawInput').value;

            if (!amount || amount <= 0) {
                showSnackbar("Invalid amount");
                return;
            }

            const res = await fetch('/api/withdraw-points-player', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({
                    userId: withdrawUserId,
                    amount: Number(amount)
                })
            });

            const data = await res.json();

            if (!res.ok) {
                showSnackbar(data.error);
                return;
            }

            showSnackbar(data.message, true);

            closeWithdrawModal();   // ✅ close ONLY after success
            loadPlayers();
        }
        //Code for logout
        async function logout() {
            try {
                const res = await fetch('/api/logout', {
                    method: 'GET',
                    credentials: 'include'
                });

                const data = await res.json();
                console.log(data);

                // ✅ Redirect after logout
                showSnackbar("Logged out successfully");

                setTimeout(() => {
                    window.location.href = '/index.html';
                }, 1000);

            } catch (err) {
                console.error(err);
                showSnackbar("Logout failed", "error");
            }
        }
        // =========================
        // Init
        // =========================
        async function init() {
            await loadConfig();
            await checkSession();
            loadPlayers();
        }

        init();
        
    </script>

</body>
</html>
