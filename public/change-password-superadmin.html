<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Change Password</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-body">

<!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <h2>Welcome, <span class="username">Super Admin</span></h2>

        <a href="superadmin.html">🏠 Dashboard</a>
        <a href="wallet-logs-sa.html">📄 Wallet Logs</a>
        <a href="commission-logs-sa.html">💰 Commission Logs</a>
        <a href="archives.html">🗂 Game Archives</a>

        <div class="category">Downlines</div>
        <a href="agents-sa.html">👥 Agents</a>
        <a href="players-sa.html">🧑 Players</a>

        <div class="category">Settings</div>
        <!--<a href="account.html">👥 Account Management</a>-->
        <a href="change-password-superadmin.html">🔑 Change Password</a>
        <a href="#" onclick="logout()">🚪 Logout</a>
    </div>

<div id="overlay" class="overlay" onclick="closeSidebar()"></div>

<div class="main">
<div class="header">
    <div class="hamburger" onclick="toggleSidebar()">☰</div>
</div>

<div class="content">

    <div id="snackbar"></div>
    <h2>Change Password</h2>

    <div class="form-box membership-card">

        <!-- CURRENT PASSWORD -->
        <div class="input-group">
            <label>Current Password</label>
            <div class="input-icon">
                <span class="icon">🔒</span>
                <input type="password" id="currentPassword" placeholder="Enter current password" required>
            </div>
        </div>

        <!-- NEW PASSWORD -->
        <div class="input-group">
            <label>New Password</label>
            <div class="input-icon">
                <span class="icon">🔑</span>
                <input type="password" id="newPassword" placeholder="Enter new password" required>
            </div>
        </div>

        <!-- CONFIRM PASSWORD -->
        <div class="input-group">
            <label>Confirm New Password</label>
            <div class="input-icon">
                <span class="icon">🔑</span>
                <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
            </div>
        </div>

        <!-- BUTTON -->
        <button onclick="changePassword()">Update Password</button>
    </div>
</div>
<footer>
    © 2024 <span class="website-name"></span>. All rights reserved.
</footer>

</div>

<script>
    // =========================
    // Global App Config
    // =========================
    let APP_CONFIG = {
        websiteName: "Website",
        websiteUrl: window.location.origin
    };

    // =========================
    // Load Config
    // =========================
    async function loadConfig() {
        try {
            const res = await fetch('/api/config');
            const data = await res.json();

            APP_CONFIG = data;

            // Update page title
            document.title = `Change Password - ${data.websiteName}`;

            // Update website placeholders
            document.querySelectorAll('.website-name')
                .forEach(el => {
                    el.textContent = data.websiteName;
                });

        } catch (err) {
            console.error('Failed to load config:', err);
        }
    }
    async function checkSession() {
            try {
                const res = await fetch('/api/dashboard', {
                    credentials: 'include'
                });

                if (res.status === 401) {
                    window.location.href = '/';
                    return;
                }

                const data = await res.json();

                if (data.role !== '-1') {
                    window.location.href = '/';
                    return;
                }

                document.querySelectorAll('.username')
                    .forEach(el => el.textContent = data.username);

                

            } catch (err) {
                console.error(err);
                window.location.href = '/';
            }
        }
    
    // =========================
            // Change password function
            // =========================
            async function changePassword() {
                const currentPassword = document.getElementById('currentPassword').value;
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                // Validation
                if (!currentPassword || !newPassword || !confirmPassword) {
                    showSnackbar("All fields are required");
                    return;
                }

                if (newPassword !== confirmPassword) {
                    showSnackbar("Passwords do not match");
                    return;
                }

                try {
                    const res = await fetch('/api/change-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify({ currentPassword, newPassword })
                    });

                    const data = await res.json();

                    if (!res.ok) {
                        showSnackbar(data.error);
                        return;
                    }

                    showSnackbar("Password updated successfully", true);

                    // Clear fields
                    document.getElementById('currentPassword').value = '';
                    document.getElementById('newPassword').value = '';
                    document.getElementById('confirmPassword').value = '';

                } catch (err) {
                    console.error(err);
                    showSnackbar("Server error");
                }
            }
  

    
    /* SIDEBAR */
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        if (window.innerWidth <= 768) {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        } else {
            sidebar.classList.toggle('collapsed');
        }
    }

    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('active');
        document.getElementById('overlay').classList.remove('active');
    }
    
    // 📢 SHOW SNACKBAR
    function showSnackbar(message, type = "success") {
        const sb = document.getElementById("snackbar");

        sb.className = ""; // RESET

        sb.textContent = message;

        if(type === "error") sb.classList.add("error");
        if(type === "warning") sb.classList.add("warning");

        sb.classList.add("show");

        setTimeout(()=>{
            sb.classList.remove("show");
        },3000);
    }
    //Code for logout
    async function logout() {
        try {
            const res = await fetch('/api/logout', {
                method: 'GET',
                credentials: 'include'
            });

            const data = await res.json();
            console.log(data);

            // ✅ Redirect after logout
            showSnackbar("Logged out successfully");

            setTimeout(() => {
                window.location.href = '/index.html';
            }, 1000);

        } catch (err) {
            console.error(err);
            showSnackbar("Logout failed", "error");
        }
    }
    // =========================
    // Init
    // =========================
    async function init() {
        await loadConfig();
        await checkSession();
    }

    init();
</script>

</body>
</html>
