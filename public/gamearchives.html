<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Archives</title>
    <link rel="stylesheet" href="style.css">
    <style> .pagination {
            margin-top: 15px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center;
        }

        .pagination button {

            width: auto !important;
            min-width: 40px;

            padding: 6px 12px;

            border: none;
            border-radius: 6px;

            cursor: pointer;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: default;
        }
    </style>
</head>

<body class="dashboard-body">

    <!-- SIDEBAR (COPY SAME SIDEBAR HERE) -->
    <div class="sidebar" id="sidebar">
        <h2>Welcome, <span class="username">Super Admin</span></h2>

        <a href="superadmin.html">🏠 Dashboard</a>
        <a href="wallet-logs-sa.html">📄 Wallet Logs</a>
        <a href="commission-logs-sa.html">💰 Commission Logs</a>
        <a href="gamearchives.html">🗂 Fight Logs</a>

        <div class="category">Downlines</div>
        <a href="agents-sa.html">👥 Agents</a>
        <a href="players-sa.html">🧑 Players</a>

        <div class="category">Settings</div>
        <!--<a href="account.html">👥 Account Management</a>-->
        <a href="change-password-superadmin.html">🔑 Change Password</a>
        <a href="#" onclick="logout()">🚪 Logout</a>
    </div>
    <!-- Overlay for mobile -->
    <div id="overlay" class="overlay" onclick="closeSidebar()"></div>
    <!-- MAIN -->
    <div class="main">

        <div class="header">
            <div class="hamburger" onclick="toggleSidebar()">☰</div>
        </div>

        <div class="content">
            <div id="snackbar"></div>
            <h2>Fight Logs</h2>
            <div class="filters">

                <input
                    type="text"
                    id="search"
                    placeholder="Search event / fight #"
                >

                <input type="date" id="from">
                <input type="date" id="to">

                <select id="limit">
                    <option value="25">25 Rows</option>
                    <option value="50">50 Rows</option>
                    <option value="100">100 Rows</option>
                </select>

                <button onclick="loadGameArchives(1)">
                    Search
                </button>

            </div>

            <div style="margin-bottom:10px;">
                Total Records:
                <span id="totalRecords">0</span>
            </div>
            <div class="table-wrapper">
                <table class="styled-table" id="walletTable">
                    <thead>
                        <tr>

                            <th onclick="sortTable('fight_number')">
                                Fight #
                            </th>

                            <th onclick="sortTable('event_name')">
                                Event
                            </th>

                            <th onclick="sortTable('meron_total')">
                                MERON
                            </th>

                            <th onclick="sortTable('wala_total')">
                                WALA
                            </th>

                            <th onclick="sortTable('draw_total')">
                                DRAW
                            </th>

                            <th onclick="sortTable('winner')">
                                Winner
                            </th>

                            <th onclick="sortTable('game_earning')">
                                Earnings
                            </th>

                            <th onclick="sortTable('created_at')">
                                Date
                            </th>

                            <th>
                                Action
                            </th>

                        </tr>
                        </thead>
                    <tbody></tbody>
                    
                </table>
                <div
                        id="pagination"
                        style="
                            margin-top:15px;
                            display:flex;
                            gap:5px;
                            flex-wrap:wrap;
                        "
                    ></div>
            </div>
        </div>

        <footer>
            © 2024 <span class="website-name"></span>. All rights reserved.
        </footer>

    </div>

    <script>
        // =========================
        // Global App Config
        // =========================
        let APP_CONFIG = {
            websiteName: "Website",
            websiteUrl: window.location.origin
        };

        // =========================
        // Load Config
        // =========================
        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                const data = await res.json();

                APP_CONFIG = data;

                // Update page title
                document.title = `Game Archives - ${data.websiteName}`;

                // Update website placeholders
                document.querySelectorAll('.website-name')
                    .forEach(el => {
                        el.textContent = data.websiteName;
                    });

            } catch (err) {
                console.error('Failed to load config:', err);
            }
        }
        async function checkSession() {
            try {
                const res = await fetch('/api/dashboard', {
                    credentials: 'include'
                });

                if (res.status === 401) {
                    window.location.href = '/';
                    return;
                }

                const data = await res.json();
                if (data.role !== 'admin') {
                    const summaryLink = document.getElementById('summaryLink');
                    if (summaryLink) summaryLink.style.display = 'none';
                }
                document.querySelectorAll('.username')
                    .forEach(el => el.textContent = data.username);

            } catch (err) {
                console.error(err);
                window.location.href = '/';
            }
            
        }

        // =========================
        // Hamburger & overlay
        // =========================
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');

            if (window.innerWidth <= 768) {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active'); // show overlay
            } else {
                sidebar.classList.toggle('collapsed');
            }
        }

        function closeSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');

            sidebar.classList.remove('active');
            overlay.classList.remove('active');
        }

        // Close sidebar if click outside (mobile)
        document.addEventListener('click', function(event) {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            if (window.innerWidth <= 768 && sidebar.classList.contains('active')) {
                if (!sidebar.contains(event.target) && !event.target.classList.contains('hamburger')) {
                    closeSidebar();
                }
            }
        });

        
        let currentPage = 1;
        let currentSort = 'id';
        let currentOrder = 'DESC';

        async function loadGameArchives(page = 1) {

            try {

                currentPage = page;

                const search =
                    document.getElementById('search').value;

                const from =
                    document.getElementById('from').value;

                const to =
                    document.getElementById('to').value;

                const limit =
                    document.getElementById('limit').value;

                const params = new URLSearchParams({
                    search,
                    from,
                    to,
                    limit,
                    page,
                    sort: currentSort,
                    order: currentOrder
                });

                const res = await fetch(
                    `/api/superadmin/game-archives?${params}`,
                    {
                        credentials: 'include'
                    }
                );

                const response = await res.json();

                const data = response.rows || [];

                document.getElementById(
                    'totalRecords'
                ).textContent = response.total || 0;

                const tbody =
                    document.querySelector(
                        '#walletTable tbody'
                    );

                tbody.innerHTML = '';

                data.forEach(game => {

                    const row =
                        document.createElement('tr');

                    row.innerHTML = `

                        <td>
                            Fight #${game.fight_number || game.id}
                        </td>

                        <td>
                            ${game.event_name || '-'}
                        </td>

                        <td>
                            ${Number(game.meron_total || 0).toFixed(2)}
                        </td>

                        <td>
                            ${Number(game.wala_total || 0).toFixed(2)}
                        </td>

                        <td>
                            ${Number(game.draw_total || 0).toFixed(2)}
                        </td>

                        <td>
                            ${game.winner || '-'}
                        </td>

                        <td>
                            ${Number(game.game_earning || 0).toFixed(2)}
                        </td>

                        <td>
                            ${new Date(game.created_at)
                                .toLocaleString()}
                        </td>

                        <td>

                            <button
                                onclick="changeWinner(${game.id})"
                            >
                                Change Winner
                            </button>

                        </td>
                    `;

                    tbody.appendChild(row);
                });

                renderPagination(
                    response.total,
                    Number(limit)
                );

            } catch (err) {

                console.error(err);
            }
        }
        function sortTable(column) {

            if (currentSort === column) {

                currentOrder =
                    currentOrder === 'ASC'
                        ? 'DESC'
                        : 'ASC';

            } else {

                currentSort = column;
                currentOrder = 'ASC';
            }

            loadGameArchives(1);
        }

        function renderPagination(total, limit) {

            const pagination =
                document.getElementById('pagination');

            pagination.innerHTML = '';

            const totalPages =
                Math.ceil(total / limit);

            for (let i = 1; i <= totalPages; i++) {

                const btn =
                    document.createElement('button');

                btn.textContent = i;

                if (i === currentPage) {
                    btn.disabled = true;
                }

                btn.onclick = () =>
                    loadGameArchives(i);

                pagination.appendChild(btn);
            }
        }

        async function changeWinner(gameId) {

            const winner = prompt(
                'Enter MERON, WALA, or DRAW'
            );

            if (!winner) return;

            try {

                const res = await fetch(
                    '/api/superadmin/change-winner',
                    {
                        method: 'POST',

                        headers: {
                            'Content-Type':
                                'application/json'
                        },

                        credentials: 'include',

                        body: JSON.stringify({
                            gameId,
                            winner: winner.toUpperCase()
                        })
                    }
                );

                const data = await res.json();

                if (!res.ok) {

                    alert(data.error || 'Failed');

                    return;
                }

                alert('Winner updated');

                loadGameArchives(currentPage);

            } catch (err) {

                console.error(err);

                alert('Server error');
            }
        }
        //Code for logout
        async function logout() {
            try {
                const res = await fetch('/api/logout', {
                    method: 'GET',
                    credentials: 'include'
                });

                const data = await res.json();
                console.log(data);

                // ✅ Redirect after logout
                showSnackbar("Logged out successfully");

                setTimeout(() => {
                    window.location.href = '/index.html';
                }, 1000);

            } catch (err) {
                console.error(err);
                showSnackbar("Logout failed", "error");
            }
        }
        // =========================
        // Init
        // =========================
        async function init() {
            await loadConfig();
            await checkSession();
            loadGameArchives();
        }

        init();
    </script>

</body>
</html>
