<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Account Management</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-body">

    <!-- SIDEBAR (COPY SAME SIDEBAR HERE) -->
    <div class="sidebar" id="sidebar">
        <h2>Welcome, <span class="username">Agent</span></h2>

        <a href="admin.html">🏠 Dashboard</a>
        <a href="summary.html">📊 Summary Report</a>
        <a href="wallet-logs.html">📄 Wallet Logs</a>
        <a href="commission-logs.html">💰 Commission Logs</a>
        <a href="withdrawal.html">💸 Commission Withdrawals 
            <span id="withdrawBadge" class="badge blue" style="display:none;">0</span>
        </a>
        <a href="archives.html">🗂 Archives</a>

        <div class="category">Downlines</div>
        <a href="agents.html">👥 Agents</a>
        <a href="players.html">🧑 Players</a>
        <a href="pending.html">⏳ Pending Approvals 
            <span id="pendingBadge" class="badge red" style="display:none;">0</span>
        </a>

        <div class="category">Settings</div>
        <a href="account.html">👥 Account Management</a>
        <a href="change-password.html">🔑 Change Password</a>
        <a href="#" onclick="logout()">🚪 Logout</a>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="header">
            <div class="hamburger" onclick="toggleSidebar()">☰</div>
        </div>

        <div class="content">
            <h2>Accounts Management</h2>
            <p>Coming soon...</p>
        </div>

        <footer>
            © 2024 <span class="website-name"></span>. All rights reserved.
        </footer>

    </div>

    <script>
        // =========================
        // Global App Config
        // =========================
        let APP_CONFIG = {
            websiteName: "Website",
            websiteUrl: window.location.origin
        };

        // =========================
        // Load Config
        // =========================
        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                const data = await res.json();

                APP_CONFIG = data;

                // Update page title
                document.title = `Account Management - ${data.websiteName}`;

                // Update website names
                document.querySelectorAll('.website-name')
                    .forEach(el => {
                        el.textContent = data.websiteName;
                    });

            } catch (err) {
                console.error('Failed to load config:', err);
            }
        }

        // =========================
        // Session Check
        // =========================
        async function checkSession() {
            try {
                const res = await fetch('/api/dashboard', {
                    credentials: 'include'
                });

                if (res.status === 401) {
                    window.location.href = '/';
                    return;
                }

                const data = await res.json();

                document.querySelectorAll('.username')
                    .forEach(el => el.textContent = data.username);

            } catch (err) {
                console.error(err);
                window.location.href = '/';
            }
        }

        // =========================
        // Sidebar Toggle
        // =========================
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
        }

        // =========================
        // Snackbar
        // =========================
        function showSnackbar(message, type = "success") {
            let snackbar = document.getElementById("snackbar");

            // Create snackbar dynamically if missing
            if (!snackbar) {
                snackbar = document.createElement("div");
                snackbar.id = "snackbar";
                document.body.appendChild(snackbar);
            }

            snackbar.textContent = message;
            snackbar.className = "";
            snackbar.classList.add(type);
            snackbar.classList.add("show");

            setTimeout(() => {
                snackbar.classList.remove("show");
            }, 3000);
        }

        // =========================
        // Logout
        // =========================
        async function logout() {
            try {
                const res = await fetch('/api/logout', {
                    method: 'GET',
                    credentials: 'include'
                });

                const data = await res.json();
                console.log(data);

                showSnackbar("Logged out successfully");

                setTimeout(() => {
                    window.location.href = '/index.html';
                }, 1000);

            } catch (err) {
                console.error(err);
                showSnackbar("Logout failed", "error");
            }
        }

        // =========================
        // Init
        // =========================
        async function init() {
            await loadConfig();
            await checkSession();
        }

        init();
    </script>

</body>
</html>
