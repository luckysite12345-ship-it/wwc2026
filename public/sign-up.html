<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sign Up</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="snackbar"></div>

<div class="login-container">

    <!-- LOGO -->
    <img src="logo.png" class="logo" alt="Logo">

    <h1 class="website-name">Website</h1><h1>SWC888</h1>
    <p class="subtitle">Create your account</p>

    <!-- USERNAME -->
    <div class="input-group">
        <label>Username</label>
        <div class="input-icon">
            <span class="icon">👤</span>
            <input type="text" id="username" placeholder="Enter username">
        </div>
    </div>

    <!-- PASSWORD -->
    <div class="input-group">
        <label>Password</label>
        <div class="input-icon">
            <span class="icon">🔒</span>
            <input type="password" id="password" placeholder="Enter password">
            <span class="toggle-password" onclick="togglePassword('password', this)">👁</span>
        </div>
    </div>

    <!-- CONFIRM PASSWORD -->
    <div class="input-group">
        <label>Confirm Password</label>
        <div class="input-icon">
            <span class="icon">🔒</span>
            <input type="password" id="confirmPassword" placeholder="Confirm password">
            <span class="toggle-password" onclick="togglePassword('confirmPassword', this)">👁</span>
        </div>
    </div>

    <button onclick="signup()">Register</button>

    <p class="login-link">
        Already have an account? 
        <a href="/">Login here</a>
    </p>

</div>

<script>
    // =========================
    // Global App Config
    // =========================
    let APP_CONFIG = {
        websiteName: "Website",
        websiteUrl: window.location.origin
    };

    // =========================
    // Load Config
    // =========================
    async function loadConfig() {
        try {
            const res = await fetch('/api/config');
            const data = await res.json();

            APP_CONFIG = data;

            // Update page title
            document.title = `Sign Up - ${data.websiteName}`;

            // Update website name placeholders
            document.querySelectorAll('.website-name')
                .forEach(el => {
                    el.textContent = data.websiteName;
                });

        } catch (err) {
            console.error('Failed to load config:', err);
        }
    }
    // =========================
    // SNACKBAR
    // =========================
    function showSnackbar(message, type = "success") {
        const bar = document.getElementById("snackbar");
        bar.textContent = message;
        bar.className = "show " + type;

        setTimeout(() => {
            bar.className = bar.className.replace("show", "").trim();
        }, 3000);
    }

    // =========================
    // TOGGLE PASSWORD
    // =========================
    function togglePassword(id, el) {
        const input = document.getElementById(id);

        if (input.type === "password") {
            input.type = "text";
            el.textContent = "🙈";
        } else {
            input.type = "password";
            el.textContent = "👁";
        }
    }

    // =========================
    // GET REF ID
    // =========================
    function getRef() {
        const params = new URLSearchParams(window.location.search);
        return params.get("ref");
    }

    // =========================
    // SIGNUP
    // =========================
    async function signup() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        const confirmPassword = document.getElementById("confirmPassword").value.trim();
        const parent_id = getRef();

        if (!username || !password || !confirmPassword) {
            showSnackbar("Fill all fields", "warning");
            return;
        }

        if (password !== confirmPassword) {
            showSnackbar("Passwords do not match", "error");
            return;
        }

        try {
            const res = await fetch('/api/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, parent_id })
            });

            const data = await res.json();

            if (data.error) {
                showSnackbar(data.error, "error");
                return;
            }

            showSnackbar("Account created! Waiting for approval", "success");

            // optional: clear fields
            document.getElementById("username").value = "";
            document.getElementById("password").value = "";
            document.getElementById("confirmPassword").value = "";

        } catch (err) {
            console.error(err);
            showSnackbar("Server error", "error");
        }
    }
    document.addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
            signup();
        }
    });
    // =========================
    // INIT
    // =========================
    async function init() {
        await loadConfig();
    }

    init();

</script>

</body>
</html>
